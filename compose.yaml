name: video-crawler

services:
  mysql:
    image: ${MYSQL_IMAGE}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [backend]
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:9001:9001"
    networks: [backend]
    restart: unless-stopped

  minio-init:
    image: ${MINIO_MC_IMAGE}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set none "local/$${MINIO_BUCKET}"
    networks: [backend]
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      mysql:
        condition: service_healthy
    networks: [backend]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    env_file: .env
    command: ["python", "-m", "uvicorn", "video_crawler.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    networks: [frontend, backend]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    env_file: .env
    command: ["python", "-m", "video_crawler.worker.main"]
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - browser_profiles:/var/lib/video-crawler/browser-profiles
    shm_size: 2gb
    networks: [backend, egress]
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true
  egress:

volumes:
  mysql_data:
  minio_data:
  browser_profiles:
